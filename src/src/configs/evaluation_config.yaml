system:
  seed: 42
  model_id: "runwayml/stable-diffusion-v1-5"

control_hyperparameters:
  lambda_base: 0.75
  gamma_reg: 0.3
  epsilon: 1e-6
  total_inference_steps: 30

evaluation_suite:
  prompts:
    - "A hyper-dimensional concept of nostalgia manifesting as a liquid crystal cathedral."
    - "A green apple turning into a blue bird that gradually melts into a rainy sidewalk morning."
